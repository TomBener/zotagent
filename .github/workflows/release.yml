name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: release_meta
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "push" ]; then
            tag_name="${GITHUB_REF_NAME}"
            tag_version="${tag_name#v}"
            if [ "$tag_version" != "$package_version" ]; then
              echo "Tag version $tag_version does not match package.json version $package_version"
              exit 1
            fi
          else
            tag_name="v${package_version}"
          fi
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Run checks
        run: npm run check

      - name: Build release tarball
        id: pack
        run: |
          package_json="$(npm pack --json --silent)"
          package_file="$(node -e 'const payload = JSON.parse(process.argv[1]); process.stdout.write(payload[0].filename);' "$package_json")"
          shasum -a 256 "$package_file" | awk '{print $1}' > "$package_file.sha256"
          echo "package_file=$package_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.pack.outputs.package_file }}
            ${{ steps.pack.outputs.package_file }}.sha256
          generate_release_notes: true
